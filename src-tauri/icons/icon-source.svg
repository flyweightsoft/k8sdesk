<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="#0d1117"/>

  <!-- k8s helm wheel — center: 512,446  outer-r:192  ring-stroke:26 -->
  <circle cx="512" cy="446" r="192" stroke="#326CE5" stroke-width="26" fill="none"/>

  <!-- 7 spokes (inner r≈42, outer r≈166) -->
  <line x1="512" y1="404" x2="512" y2="280"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="545" y1="420" x2="642" y2="342"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="553" y1="456" x2="674" y2="483"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="530" y1="484" x2="584" y2="596"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="494" y1="484" x2="440" y2="596"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="471" y1="456" x2="350" y2="483"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>
  <line x1="479" y1="420" x2="382" y2="342"  stroke="#326CE5" stroke-width="18" stroke-linecap="round"/>

  <!-- Hub -->
  <circle cx="512" cy="446" r="42" fill="#326CE5"/>

  <!-- Desk: tabletop -->
  <rect x="240" y="686" width="544" height="37" rx="18" fill="#e2e8f0"/>
  <!-- Left leg -->
  <rect x="288" y="723" width="37"  height="88" rx="14" fill="#e2e8f0"/>
  <!-- Right leg -->
  <rect x="699" y="723" width="37"  height="88" rx="14" fill="#e2e8f0"/>
</svg>
