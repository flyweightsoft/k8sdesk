name: Release

# Trigger: push a tag like v1.0.0  →  git tag v1.0.0 && git push origin v1.0.0
# Or run manually via the Actions tab (artifacts uploaded, no Release created).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal — produces .dmg (+ .app)
          - platform: macos-latest
            args: '--target universal-apple-darwin --bundles dmg,app'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

          # Windows — produces NSIS .exe installer
          - platform: windows-latest
            args: '--bundles nsis'
            rust-targets: ''

          # Linux — produces .deb
          - platform: ubuntu-22.04
            args: '--bundles deb'
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: npm ci --legacy-peer-deps

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: Apple code-signing / notarization
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'k8sdesk ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon + Intel) | `k8sdesk_*_universal.dmg` |
            | Windows                       | `k8sdesk_*_x64-setup.exe` |
            | Linux                         | `k8sdesk_*_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Upload artifacts for manual runs (no tag → no Release)
      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: k8sdesk-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
